<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      text-align: center;
      padding: 40px;
      background: rgba(0,0,0,0.3);
      border-radius: 20px;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
    }
    p {
      font-size: 1.2rem;
    }
    button {
      margin-top: 20px;
      padding: 12px 30px;
      font-size: 1rem;
      background: white;
      color: #764ba2;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    button:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hi, I'm Srishti 👋</h1>
    <p>Web Developer | Designer | Creator</p>
    <button onclick="alert('Contact me at: srishti@email.com')">Contact Me</button>
  </div>
</body>
</html>
